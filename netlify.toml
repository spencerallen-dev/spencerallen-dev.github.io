[build]
  publish = "."

# Handle common spelling typos (/privet, /privete -> /private/)
[[redirects]]
  from = "/privet"
  to = "/private/"
  status = 301

[[redirects]]
  from = "/privet/*"
  to = "/private/:splat"
  status = 301

[[redirects]]
  from = "/privete"
  to = "/private/"
  status = 301

[[redirects]]
  from = "/privete/*"
  to = "/private/:splat"
  status = 301

# Server-side HTTP headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
