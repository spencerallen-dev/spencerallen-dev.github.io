[build]
  publish = "."

# Forced Role-based access for authenticated users with 'admin' or 'user' role
[[redirects]]
  from = "/private"
  to = "/private/"
  status = 301
  force = true

[[redirects]]
  from = "/private/*"
  to = "/private/:splat"
  status = 200
  force = true
  conditions = {Role = ["admin", "user"]}

# Unauthenticated Fallback: Forced server-side redirect to homepage for unauthenticated requests
[[redirects]]
  from = "/private"
  to = "/"
  status = 302
  force = true

[[redirects]]
  from = "/private/*"
  to = "/"
  status = 302
  force = true

# Server-side HTTP headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
