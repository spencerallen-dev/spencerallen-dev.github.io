[build]
  publish = "."

# Protect /private route: Redirect users WITHOUT 'admin' or 'user' roles to homepage
[[redirects]]
  from = "/private"
  to = "/"
  status = 302
  force = true
  conditions = {Role = ["!admin", "!user"]}

[[redirects]]
  from = "/private/*"
  to = "/"
  status = 302
  force = true
  conditions = {Role = ["!admin", "!user"]}

# Server-side HTTP headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
