<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Portal - Spencer Allen</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/218202713?s=400&u=51caf98913829540eca74b7fa7ecb351ddd744bd&v=4" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<canvas id="bg"></canvas>

<header>
  <h1>Spencer Allen</h1>
  <nav>
    <a href="../">Home</a>
    <a href="../about/">About</a>
    <a href="../tech/">Tech</a>
    <a href="../games/">Games</a>
    <a href="../blog/">Blog</a>
    <a href="../aviation/">Aviation</a>
  </nav>
</header>

<div class="main-content" id="private-content">
  <h2>Private Area</h2>
  <p id="user-status">Authenticating session with Netlify Identity...</p>
  
  <div class="buttons" id="auth-buttons" style="display: none;">
    <a href="#" id="login-btn" onclick="if(window.netlifyIdentity) netlifyIdentity.open(); return false;">Log In</a>
    <a href="#" id="logout-btn" onclick="if(window.netlifyIdentity) netlifyIdentity.logout(); return false;" style="display: none;">Log Out</a>
  </div>

  <div id="protected-data" style="display: none; margin-top: 30px; padding: 25px; border: 1px solid #00d4ff; border-radius: 15px; background: rgba(0,212,255,0.05); text-align: left; max-width: 600px; margin-left: auto; margin-right: auto;">
    <h3 style="color: #66ffff; margin-top: 0;">Authorized Access Only</h3>
    <p>Welcome to the private section of spencerallen.me. This area is protected via Netlify access control rules.</p>
  </div>
</div>

<footer>
  <a href="https://github.com/spencerallen-dev">GitHub</a>
</footer>

<script src="../js/simple.js"></script>
<script>
  window.addEventListener('load', () => {
    const main = document.querySelector('.main-content');
    if (main) main.classList.add('visible');
  });

  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      updateUI(user);
    });
    window.netlifyIdentity.on("login", user => {
      updateUI(user);
      window.netlifyIdentity.close();
    });
    window.netlifyIdentity.on("logout", () => {
      updateUI(null);
    });
  }

  function updateUI(user) {
    const status = document.getElementById('user-status');
    const authBtns = document.getElementById('auth-buttons');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const data = document.getElementById('protected-data');

    if (authBtns) authBtns.style.display = 'block';

    if (user) {
      status.textContent = `Welcome back, ${user.user_metadata?.full_name || user.email}!`;
      if (loginBtn) loginBtn.style.display = 'none';
      if (logoutBtn) {
        logoutBtn.style.display = 'inline-block';
        logoutBtn.classList.add('visible');
      }
      if (data) data.style.display = 'block';
    } else {
      status.textContent = 'Access Restricted: Please log in to view this section.';
      if (loginBtn) {
        loginBtn.style.display = 'inline-block';
        loginBtn.classList.add('visible');
      }
      if (logoutBtn) logoutBtn.style.display = 'none';
      if (data) data.style.display = 'none';
    }
  }
</script>
</body>
</html>
